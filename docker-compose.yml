version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: teammind-db
    environment:
      POSTGRES_USER: teammind
      POSTGRES_PASSWORD: teammind
      POSTGRES_DB: teammind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
